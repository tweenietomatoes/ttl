name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@v4
      - uses: anchore/sbom-action/download-syft@v0.24.0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: go test -count=1 ./...

      - name: Vulnerability scan
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_PUBLISH_TOKEN }}
          REPO_PUBLISH_TOKEN: ${{ secrets.REPO_PUBLISH_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: dist/checksums.txt

      - name: Container SBOM attach
        run: |
          set -euo pipefail
          TAG="ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}"
          syft "$TAG" -o spdx-json=container.sbom.spdx.json
          cosign attest --yes \
            --predicate container.sbom.spdx.json \
            --type spdxjson "$TAG"

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
