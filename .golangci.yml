version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gosec
    - bodyclose
    - copyloopvar
    - prealloc
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
