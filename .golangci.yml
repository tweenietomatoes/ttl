version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - misspell
    - revive
    - gosec
    - bodyclose
    - copyloopvar
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - os.Remove
    staticcheck:
      checks:
        - all
        # ST1005 disabled: user-facing CLI error strings are intentionally
        # capitalized for output consistency ("Error: Cannot read ...").
        - "-ST1005"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose
          - revive
          - prealloc
